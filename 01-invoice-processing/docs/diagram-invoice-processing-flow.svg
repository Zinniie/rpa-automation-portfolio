<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Invoice processing automation flow</title>
<desc>End-to-end flow from queue item through Document Understanding, SQL validation, and exception handling</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, sans-serif; fill: #222; }
.th  { font-size: 14px; font-weight: 600; fill: #222; }
.ts  { font-size: 12px; font-weight: 400; fill: #555; }
.arr { stroke: #888; stroke-width: 1.2; fill: none; }
.c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   text { fill: #085041; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple text { fill: #3C3489; }
.c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  text { fill: #712B13; }
.c-gray   rect, .c-gray polygon { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray text { fill: #2C2C2A; }
</style>
</defs>
<g class="c-gray"><rect x="240" y="20" width="200" height="40" rx="20" stroke-width="0.5"/><text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Orchestrator queue item</text></g>
<line x1="340" y1="60" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="200" y="90" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="112" text-anchor="middle" dominant-baseline="central">Document Understanding</text><text class="ts" x="340" y="130" text-anchor="middle" dominant-baseline="central">Extract fields from PDF via ABBYY OCR</text></g>
<line x1="340" y1="146" x2="340" y2="176" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><polygon points="340,176 430,210 340,244 250,210" stroke-width="0.5"/><text class="th" x="340" y="210" text-anchor="middle" dominant-baseline="central">Confidence &gt; 80%?</text></g>
<line x1="430" y1="210" x2="530" y2="210" class="arr" marker-end="url(#arrow)" stroke="#D85A30"/>
<text class="ts" x="472" y="203" text-anchor="middle">No</text>
<g class="c-coral"><rect x="530" y="188" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="590" y="208" text-anchor="middle" dominant-baseline="central">Human review</text><text class="ts" x="590" y="224" text-anchor="middle" dominant-baseline="central">queue</text></g>
<line x1="340" y1="244" x2="340" y2="274" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="263" dominant-baseline="central">Yes</text>
<g class="c-purple"><rect x="200" y="274" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="296" text-anchor="middle" dominant-baseline="central">SQL validation</text><text class="ts" x="340" y="314" text-anchor="middle" dominant-baseline="central">sp_ValidateInvoiceAgainstPO</text></g>
<line x1="340" y1="330" x2="340" y2="360" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><polygon points="340,360 430,394 340,428 250,394" stroke-width="0.5"/><text class="th" x="340" y="394" text-anchor="middle" dominant-baseline="central">Validation passed?</text></g>
<line x1="430" y1="394" x2="530" y2="394" class="arr" marker-end="url(#arrow)" stroke="#D85A30"/>
<text class="ts" x="472" y="387" text-anchor="middle">No</text>
<g class="c-coral"><rect x="530" y="370" width="120" height="56" rx="8" stroke-width="0.5"/><text class="th" x="590" y="390" text-anchor="middle" dominant-baseline="central">Business</text><text class="th" x="590" y="408" text-anchor="middle" dominant-baseline="central">exception</text></g>
<text class="ts" x="580" y="440" text-anchor="middle">Log · fail · alert</text>
<line x1="340" y1="428" x2="340" y2="458" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="447" dominant-baseline="central">Yes</text>
<g class="c-teal"><rect x="200" y="458" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="480" text-anchor="middle" dominant-baseline="central">Insert payment record</text><text class="ts" x="340" y="498" text-anchor="middle" dominant-baseline="central">sp_InsertInvoicePaymentRecord</text></g>
<line x1="340" y1="514" x2="340" y2="544" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="200" y="544" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="566" text-anchor="middle" dominant-baseline="central">Write audit log</text><text class="ts" x="340" y="584" text-anchor="middle" dominant-baseline="central">WriteAuditLog.xaml — dbo.RPA_AuditLog</text></g>
<line x1="340" y1="600" x2="340" y2="630" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="240" y="630" width="200" height="40" rx="20" stroke-width="0.5"/><text class="th" x="340" y="650" text-anchor="middle" dominant-baseline="central">Queue item: Successful</text></g>
<rect x="40" y="678" width="12" height="12" rx="2" fill="#1D9E75"/><text class="ts" x="58" y="689">Processing steps</text>
<rect x="200" y="678" width="12" height="12" rx="2" fill="#534AB7"/><text class="ts" x="218" y="689">SQL operations</text>
<rect x="360" y="678" width="12" height="12" rx="2" fill="#D85A30"/><text class="ts" x="378" y="689">Exception paths</text>
</svg>
