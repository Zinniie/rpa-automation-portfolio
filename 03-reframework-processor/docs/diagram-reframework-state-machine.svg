<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>UiPath REFramework state machine</title>
<desc>The four REFramework states with exception handling paths</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, sans-serif; fill: #222; }
.th  { font-size: 14px; font-weight: 600; fill: #222; }
.ts  { font-size: 12px; font-weight: 400; fill: #555; }
.arr { stroke: #888; stroke-width: 1.2; fill: none; }
.c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-coral  rect { fill: #FAECE7; stroke: #993C1D; }
.c-amber  rect { fill: #FAEEDA; stroke: #854F0B; }
.c-gray   rect, .c-gray polygon { fill: #F1EFE8; stroke: #5F5E5A; }
.c-teal   text { fill: #085041; }
.c-purple text { fill: #3C3489; }
.c-coral  text { fill: #712B13; }
.c-amber  text { fill: #633806; }
.c-gray   text { fill: #2C2C2A; }
</style>
</defs>

<g class="c-gray"><rect x="240" y="20" width="200" height="44" rx="22" stroke-width="0.5"/><text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Start</text></g>
<line x1="340" y1="64" x2="340" y2="98" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="190" y="98" width="300" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central">Initialisation</text><text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central">Load config · open apps · validate env</text></g>
<line x1="340" y1="162" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="183" dominant-baseline="central">Success</text>
<g class="c-teal"><rect x="190" y="196" width="300" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central">Get transaction</text><text class="ts" x="340" y="238" text-anchor="middle" dominant-baseline="central">Fetch next item from Orchestrator queue</text></g>
<line x1="340" y1="260" x2="340" y2="294" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="281" dominant-baseline="central">Item found</text>
<g class="c-purple"><rect x="190" y="294" width="300" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="316" text-anchor="middle" dominant-baseline="central">Process transaction</text><text class="ts" x="340" y="336" text-anchor="middle" dominant-baseline="central">Extract · validate · update · log</text></g>
<path d="M340 358 L340 390 L490 390 L490 228" fill="none" stroke="#5DCAA5" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="516" y="282" dominant-baseline="central">Next item</text>
<g class="c-gray"><rect x="190" y="460" width="300" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="482" text-anchor="middle" dominant-baseline="central">End process</text><text class="ts" x="340" y="502" text-anchor="middle" dominant-baseline="central">Close apps · send summary · log stats</text></g>
<path d="M190 228 L130 228 L130 492 L190 492" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="38" y="282" dominant-baseline="central">No items</text>
<text class="ts" x="38" y="298" dominant-baseline="central">remain</text>
<g class="c-coral"><rect x="400" y="390" width="220" height="56" rx="8" stroke-width="0.5"/><text class="th" x="510" y="412" text-anchor="middle" dominant-baseline="central">Business exception</text><text class="ts" x="510" y="430" text-anchor="middle" dominant-baseline="central">Fail item · log · alert</text></g>
<path d="M490 358 L490 390" fill="none" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="500" y="378" dominant-baseline="central">BRE</text>
<g class="c-amber"><rect x="400" y="470" width="220" height="56" rx="8" stroke-width="0.5"/><text class="th" x="510" y="492" text-anchor="middle" dominant-baseline="central">Application exception</text><text class="ts" x="510" y="510" text-anchor="middle" dominant-baseline="central">Retry up to max · then fail</text></g>
<path d="M490 446 L490 470" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="500" y="462" dominant-baseline="central">App ex</text>
<path d="M400 418 L370 418 L370 294" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M400 498 L360 498 L360 294" fill="none" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<rect x="40" y="490" width="12" height="12" rx="2" fill="#1D9E75"/><text class="ts" x="58" y="501">Main flow</text>
<rect x="40" y="510" width="12" height="12" rx="2" fill="#D85A30"/><text class="ts" x="58" y="521">Business exception</text>
<rect x="40" y="530" width="12" height="12" rx="2" fill="#BA7517"/><text class="ts" x="58" y="541">Application exception</text>
</svg>
