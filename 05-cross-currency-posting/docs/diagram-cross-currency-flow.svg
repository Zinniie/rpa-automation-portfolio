<svg width="100%" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Cross Currency Posting Automation flow diagram</title>
<desc>Three-session daily posting flow from scheduler through Business Day API, file retrieval, core banking posting, and stakeholder notification</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, sans-serif; fill: #222; }
.th  { font-size: 14px; font-weight: 600; fill: #222; }
.ts  { font-size: 12px; font-weight: 400; fill: #555; }
.arr { stroke: #888; stroke-width: 1.2; fill: none; }
.c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   text { fill: #085041; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple text { fill: #3C3489; }
.c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  text { fill: #712B13; }
.c-gray   rect, .c-gray polygon { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray text { fill: #2C2C2A; }
</style>
</defs>

<g class="c-gray"><rect x="230" y="20" width="220" height="44" rx="22" stroke-width="0.5"/><text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Blue Prism scheduler</text></g>
<line x1="340" y1="64" x2="340" y2="94" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="190" y="94" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="116" text-anchor="middle" dominant-baseline="central">Process Administrator</text><text class="ts" x="340" y="134" text-anchor="middle" dominant-baseline="central">Triggers at 06:30 AM daily</text></g>
<line x1="340" y1="150" x2="340" y2="180" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="190" y="180" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="202" text-anchor="middle" dominant-baseline="central">Call Business Day API</text><text class="ts" x="340" y="220" text-anchor="middle" dominant-baseline="central">Returns IsBusinessDay flag</text></g>
<line x1="340" y1="236" x2="340" y2="266" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><polygon points="340,266 440,304 340,342 240,304" stroke-width="0.5"/><text class="th" x="340" y="304" text-anchor="middle" dominant-baseline="central">Business day?</text></g>
<line x1="240" y1="304" x2="80" y2="304" class="arr" marker-end="url(#arrow)" stroke="#D85A30"/>
<text class="ts" x="152" y="295" text-anchor="middle">No</text>
<g class="c-coral"><rect x="20" y="282" width="148" height="44" rx="8" stroke-width="0.5"/><text class="th" x="94" y="298" text-anchor="middle" dominant-baseline="central">Send notification</text><text class="ts" x="94" y="316" text-anchor="middle" dominant-baseline="central">Terminate session</text></g>
<line x1="340" y1="342" x2="340" y2="372" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="361" dominant-baseline="central">Yes</text>
<g class="c-purple"><rect x="190" y="372" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="394" text-anchor="middle" dominant-baseline="central">Get eligible products</text><text class="ts" x="340" y="412" text-anchor="middle" dominant-baseline="central">FXP1 · FXP2 · FXP3 — check status + retries</text></g>
<line x1="340" y1="428" x2="340" y2="458" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><polygon points="340,458 440,496 340,534 240,496" stroke-width="0.5"/><text class="th" x="340" y="496" text-anchor="middle" dominant-baseline="central">File available?</text></g>
<line x1="440" y1="496" x2="570" y2="496" class="arr" marker-end="url(#arrow)" stroke="#D85A30"/>
<text class="ts" x="498" y="487" text-anchor="middle">No</text>
<g class="c-coral"><rect x="516" y="474" width="148" height="44" rx="8" stroke-width="0.5"/><text class="th" x="590" y="490" text-anchor="middle" dominant-baseline="central">Exception email</text><text class="ts" x="590" y="508" text-anchor="middle" dominant-baseline="central">Terminate session</text></g>
<line x1="340" y1="534" x2="340" y2="564" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="553" dominant-baseline="central">Yes</text>
<g class="c-teal"><rect x="190" y="564" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="586" text-anchor="middle" dominant-baseline="central">Read file · prepare items</text><text class="ts" x="340" y="604" text-anchor="middle" dominant-baseline="central">Bulk insert into CrossCurrencyItems</text></g>
<line x1="340" y1="620" x2="340" y2="650" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="190" y="650" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="672" text-anchor="middle" dominant-baseline="central">Call Core Banking API</text><text class="ts" x="340" y="690" text-anchor="middle" dominant-baseline="central">Post validated credit entries</text></g>
<line x1="340" y1="706" x2="340" y2="736" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="190" y="736" width="300" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="758" text-anchor="middle" dominant-baseline="central">Send results email + Excel report</text></g>
<rect x="20" y="738" width="12" height="12" rx="2" fill="#1D9E75"/><text class="ts" x="38" y="749">Processing steps</text>
<rect x="20" y="756" width="12" height="12" rx="2" fill="#534AB7"/><text class="ts" x="38" y="767">SQL / API operations</text>
<rect x="20" y="774" width="12" height="12" rx="2" fill="#D85A30"/><text class="ts" x="38" y="785">Exception paths</text>
</svg>
