<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>User Access Management Automation flow diagram</title>
<desc>Event-driven flow from middleware API through SQL job, bot processing, portal execution, screenshot capture, and stakeholder notification</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, sans-serif; fill: #222; }
.th  { font-size: 14px; font-weight: 600; fill: #222; }
.ts  { font-size: 12px; font-weight: 400; fill: #555; }
.arr { stroke: #888; stroke-width: 1.2; fill: none; }
.c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   text { fill: #085041; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple text { fill: #3C3489; }
.c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  text { fill: #712B13; }
.c-amber  rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber  text { fill: #633806; }
.c-gray   rect, .c-gray polygon { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray text { fill: #2C2C2A; }
</style>
</defs>

<!-- Middleware -->
<g class="c-gray"><rect x="190" y="20" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Middleware API</text><text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">Approved requests from branches</text></g>
<line x1="340" y1="76" x2="340" y2="106" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="95" dominant-baseline="central">Every 5 min</text>

<!-- SQL Job -->
<g class="c-amber"><rect x="190" y="106" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">Log UAM Items to DB</text><text class="ts" x="340" y="146" text-anchor="middle" dominant-baseline="central">SQL Agent Job — populates RequestTable + UAMApiData</text></g>
<line x1="340" y1="162" x2="340" y2="192" class="arr" marker-end="url(#arrow)"/>

<!-- UAM Process -->
<g class="c-teal"><rect x="190" y="192" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="214" text-anchor="middle" dominant-baseline="central">UAM Process (Blue Prism)</text><text class="ts" x="340" y="232" text-anchor="middle" dominant-baseline="central">Query RequestTable — retrieve pending requests</text></g>
<line x1="340" y1="248" x2="340" y2="278" class="arr" marker-end="url(#arrow)"/>

<!-- Decision: Requests? -->
<g class="c-gray"><polygon points="340,278 440,316 340,354 240,316" stroke-width="0.5"/><text class="th" x="340" y="316" text-anchor="middle" dominant-baseline="central">Requests pending?</text></g>

<!-- No path -->
<line x1="240" y1="316" x2="80" y2="316" class="arr" marker-end="url(#arrow)" stroke="#888"/>
<text class="ts" x="152" y="307" text-anchor="middle">No</text>
<g class="c-gray"><rect x="20" y="294" width="148" height="44" rx="8" stroke-width="0.5"/><text class="th" x="94" y="310" text-anchor="middle" dominant-baseline="central">Wait for next</text><text class="ts" x="94" y="328" text-anchor="middle" dominant-baseline="central">5-min cycle</text></g>

<!-- Yes path -->
<line x1="340" y1="354" x2="340" y2="384" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="373" dominant-baseline="central">Yes</text>

<!-- Route by type -->
<g class="c-purple"><rect x="190" y="384" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="406" text-anchor="middle" dominant-baseline="central">Route by RequestType</text><text class="ts" x="340" y="424" text-anchor="middle" dominant-baseline="central">N · D · M · P · R — read UAMApiData for details</text></g>
<line x1="340" y1="440" x2="340" y2="470" class="arr" marker-end="url(#arrow)"/>

<!-- Portal execution -->
<g class="c-teal"><rect x="190" y="470" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="492" text-anchor="middle" dominant-baseline="central">Execute on BN InfoShare</text><text class="ts" x="340" y="510" text-anchor="middle" dominant-baseline="central">Login · navigate · assign role · grant access</text></g>
<line x1="340" y1="526" x2="340" y2="556" class="arr" marker-end="url(#arrow)"/>

<!-- Decision: Success? -->
<g class="c-gray"><polygon points="340,556 440,594 340,632 240,594" stroke-width="0.5"/><text class="th" x="340" y="594" text-anchor="middle" dominant-baseline="central">Successful?</text></g>

<!-- Exception path -->
<line x1="440" y1="594" x2="560" y2="594" class="arr" marker-end="url(#arrow)" stroke="#D85A30"/>
<text class="ts" x="493" y="585" text-anchor="middle">No</text>
<g class="c-coral"><rect x="514" y="570" width="148" height="56" rx="8" stroke-width="0.5"/><text class="th" x="588" y="590" text-anchor="middle" dominant-baseline="central">Send exception</text><text class="ts" x="588" y="608" text-anchor="middle" dominant-baseline="central">email · mark failed</text></g>

<!-- Success path -->
<line x1="340" y1="632" x2="340" y2="662" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="651" dominant-baseline="central">Yes</text>

<!-- Screenshot + email -->
<g class="c-teal"><rect x="190" y="662" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="684" text-anchor="middle" dominant-baseline="central">Capture screenshot · send email</text><text class="ts" x="340" y="702" text-anchor="middle" dominant-baseline="central">Update IsProcessed = 1 in RequestTable</text></g>

<!-- Legend -->
<rect x="20" y="720" width="12" height="12" rx="2" fill="#1D9E75"/><text class="ts" x="38" y="731">Bot processing</text>
<rect x="140" y="720" width="12" height="12" rx="2" fill="#534AB7"/><text class="ts" x="158" y="731">Routing / logic</text>
<rect x="270" y="720" width="12" height="12" rx="2" fill="#BA7517"/><text class="ts" x="288" y="731">SQL job</text>
<rect x="370" y="720" width="12" height="12" rx="2" fill="#D85A30"/><text class="ts" x="388" y="731">Exception path</text>

</svg>
