<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Merchant Debit POS Settlement flow diagram</title>
<desc>Daily settlement flow from Business Day API check through dual-source file retrieval, data processing, report generation, posting control, and stakeholder notification</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, sans-serif; fill: #222; }
.th  { font-size: 14px; font-weight: 600; fill: #222; }
.ts  { font-size: 12px; font-weight: 400; fill: #555; }
.arr { stroke: #888; stroke-width: 1.2; fill: none; }
.c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   text { fill: #085041; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple text { fill: #3C3489; }
.c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  text { fill: #712B13; }
.c-amber  rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber  text { fill: #633806; }
.c-gray   rect, .c-gray polygon { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray text { fill: #2C2C2A; }
</style>
</defs>

<!-- Trigger -->
<g class="c-gray"><rect x="190" y="20" width="300" height="44" rx="22" stroke-width="0.5"/><text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Scheduler trigger — 09:45 AM</text></g>
<line x1="340" y1="64" x2="340" y2="94" class="arr" marker-end="url(#arrow)"/>

<!-- Business Day API -->
<g class="c-teal"><rect x="190" y="94" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="116" text-anchor="middle" dominant-baseline="central">Call Business Day API</text><text class="ts" x="340" y="134" text-anchor="middle" dominant-baseline="central">Returns IsBusinessDay flag</text></g>
<line x1="340" y1="150" x2="340" y2="180" class="arr" marker-end="url(#arrow)"/>

<!-- Business Day decision -->
<g class="c-gray"><polygon points="340,180 440,218 340,256 240,218" stroke-width="0.5"/><text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central">Business day?</text></g>
<line x1="240" y1="218" x2="80" y2="218" class="arr" marker-end="url(#arrow)" stroke="#D85A30"/>
<text class="ts" x="152" y="209" text-anchor="middle">No</text>
<g class="c-coral"><rect x="20" y="196" width="148" height="44" rx="8" stroke-width="0.5"/><text class="th" x="94" y="212" text-anchor="middle" dominant-baseline="central">Notify · terminate</text><text class="ts" x="94" y="230" text-anchor="middle" dominant-baseline="central">non-business day</text></g>
<line x1="340" y1="256" x2="340" y2="286" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="275" dominant-baseline="central">Yes</text>

<!-- Working day calc -->
<g class="c-purple"><rect x="190" y="286" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="308" text-anchor="middle" dominant-baseline="central">Calculate working day</text><text class="ts" x="340" y="326" text-anchor="middle" dominant-baseline="central">Adjust for weekends · determine date range</text></g>
<line x1="340" y1="342" x2="340" y2="372" class="arr" marker-end="url(#arrow)"/>

<!-- File exists decision -->
<g class="c-gray"><polygon points="340,372 440,410 340,448 240,410" stroke-width="0.5"/><text class="th" x="340" y="410" text-anchor="middle" dominant-baseline="central">File in shared folder?</text></g>

<!-- Portal path -->
<line x1="440" y1="410" x2="560" y2="410" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>
<text class="ts" x="493" y="401" text-anchor="middle">No</text>
<g class="c-amber"><rect x="514" y="386" width="148" height="56" rx="8" stroke-width="0.5"/><text class="th" x="588" y="406" text-anchor="middle" dominant-baseline="central">Login to Portal</text><text class="ts" x="588" y="424" text-anchor="middle" dominant-baseline="central">Download files</text></g>
<path d="M588 442 L588 490 L490 490" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Direct path -->
<line x1="340" y1="448" x2="340" y2="480" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="467" dominant-baseline="central">Yes</text>

<!-- Process file -->
<g class="c-teal"><rect x="190" y="480" width="300" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="502" text-anchor="middle" dominant-baseline="central">Process settlement data file</text><text class="ts" x="340" y="520" text-anchor="middle" dominant-baseline="central">Read entries · load to BNRPA DB</text></g>
<line x1="340" y1="536" x2="340" y2="566" class="arr" marker-end="url(#arrow)"/>

<!-- Generate report -->
<g class="c-teal"><rect x="190" y="566" width="300" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="588" text-anchor="middle" dominant-baseline="central">Generate settlement report</text></g>
<line x1="340" y1="610" x2="340" y2="640" class="arr" marker-end="url(#arrow)"/>

<!-- IsPostingOn decision -->
<g class="c-gray"><polygon points="340,640 440,678 340,716 240,678" stroke-width="0.5"/><text class="th" x="340" y="678" text-anchor="middle" dominant-baseline="central">IsPostingOn?</text></g>

<!-- Posting off path -->
<line x1="240" y1="678" x2="80" y2="678" class="arr" marker-end="url(#arrow)" stroke="#888"/>
<text class="ts" x="152" y="669" text-anchor="middle">Off</text>
<g class="c-gray"><rect x="20" y="656" width="148" height="44" rx="8" stroke-width="0.5"/><text class="th" x="94" y="672" text-anchor="middle" dominant-baseline="central">Send report only</text><text class="ts" x="94" y="690" text-anchor="middle" dominant-baseline="central">No posting</text></g>

<!-- Posting on path -->
<line x1="340" y1="716" x2="340" y2="746" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="354" y="735" dominant-baseline="central">On</text>
<g class="c-purple"><rect x="190" y="746" width="300" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="768" text-anchor="middle" dominant-baseline="central">Post settlement entries</text></g>
<line x1="340" y1="790" x2="340" y2="800" class="arr" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="20" y="780" width="12" height="12" rx="2" fill="#1D9E75"/><text class="ts" x="38" y="791">Processing steps</text>
<rect x="160" y="780" width="12" height="12" rx="2" fill="#534AB7"/><text class="ts" x="178" y="791">Calculation / routing</text>
<rect x="320" y="780" width="12" height="12" rx="2" fill="#BA7517"/><text class="ts" x="338" y="791">Portal download</text>
<rect x="460" y="780" width="12" height="12" rx="2" fill="#D85A30"/><text class="ts" x="478" y="791">Exception path</text>
</svg>
