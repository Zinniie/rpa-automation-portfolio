<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Bank reconciliation bot flow</title>
<desc>Blue Prism reconciliation flow from two data sources through SQL matching to report generation</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, sans-serif; fill: #222; }
.th  { font-size: 14px; font-weight: 600; fill: #222; }
.ts  { font-size: 12px; font-weight: 400; fill: #555; }
.arr { stroke: #888; stroke-width: 1.2; fill: none; }
.c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   text { fill: #085041; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple text { fill: #3C3489; }
.c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  text { fill: #712B13; }
.c-amber  rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber  text { fill: #633806; }
.c-gray   rect, .c-gray polygon { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray text { fill: #2C2C2A; }
</style>
</defs>
<g class="c-teal"><rect x="60" y="20" width="200" height="56" rx="8" stroke-width="0.5"/><text class="th" x="160" y="42" text-anchor="middle" dominant-baseline="central">Source A</text><text class="ts" x="160" y="60" text-anchor="middle" dominant-baseline="central">Banking system</text></g>
<g class="c-purple"><rect x="420" y="20" width="200" height="56" rx="8" stroke-width="0.5"/><text class="th" x="520" y="42" text-anchor="middle" dominant-baseline="central">Source B</text><text class="ts" x="520" y="60" text-anchor="middle" dominant-baseline="central">Excel export</text></g>
<line x1="160" y1="76" x2="270" y2="120" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="76" x2="410" y2="120" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="200" y="120" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">SQL matching logic</text><text class="ts" x="340" y="160" text-anchor="middle" dominant-baseline="central">Match by ref · amount · date tolerance</text></g>
<line x1="340" y1="176" x2="340" y2="210" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><polygon points="340,210 440,248 340,286 240,248" stroke-width="0.5"/><text class="th" x="340" y="248" text-anchor="middle" dominant-baseline="central">Match outcome?</text></g>
<line x1="340" y1="286" x2="340" y2="316" class="arr" marker-end="url(#arrow)" stroke="#1D9E75"/>
<text class="ts" x="354" y="305" dominant-baseline="central">Matched</text>
<g class="c-teal"><rect x="200" y="316" width="280" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="338" text-anchor="middle" dominant-baseline="central">Log as reconciled</text></g>
<line x1="240" y1="248" x2="80" y2="248" class="arr" marker-end="url(#arrow)" stroke="#D85A30"/>
<text class="ts" x="152" y="238" text-anchor="middle">Unmatched</text>
<g class="c-coral"><rect x="20" y="316" width="160" height="56" rx="8" stroke-width="0.5"/><text class="th" x="100" y="338" text-anchor="middle" dominant-baseline="central">Flag for</text><text class="th" x="100" y="356" text-anchor="middle" dominant-baseline="central">investigation</text></g>
<line x1="440" y1="248" x2="570" y2="248" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>
<text class="ts" x="500" y="238" text-anchor="middle">Discrepancy</text>
<g class="c-amber"><rect x="500" y="316" width="160" height="56" rx="8" stroke-width="0.5"/><text class="th" x="580" y="338" text-anchor="middle" dominant-baseline="central">Flag delta</text><text class="th" x="580" y="356" text-anchor="middle" dominant-baseline="central">+ escalate</text></g>
<line x1="340" y1="360" x2="340" y2="410" class="arr" marker-end="url(#arrow)"/>
<path d="M100 372 L100 430 L200 430" fill="none" stroke="#D85A30" stroke-width="0.8" marker-end="url(#arrow)"/>
<path d="M580 372 L580 430 L480 430" fill="none" stroke="#BA7517" stroke-width="0.8" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="200" y="410" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="432" text-anchor="middle" dominant-baseline="central">Write audit log</text><text class="ts" x="340" y="450" text-anchor="middle" dominant-baseline="central">sp_InsertReconciliationResult</text></g>
<line x1="340" y1="466" x2="340" y2="496" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="200" y="496" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="518" text-anchor="middle" dominant-baseline="central">Generate Excel report</text><text class="ts" x="340" y="536" text-anchor="middle" dominant-baseline="central">Matched · discrepancies · unmatched</text></g>
<line x1="340" y1="552" x2="340" y2="582" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="200" y="582" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="604" text-anchor="middle" dominant-baseline="central">Send summary email</text><text class="ts" x="340" y="622" text-anchor="middle" dominant-baseline="central">sp_InsertReconRunAudit · notify team</text></g>
<rect x="40" y="648" width="12" height="12" rx="2" fill="#1D9E75"/><text class="ts" x="58" y="659">Matched</text>
<rect x="140" y="648" width="12" height="12" rx="2" fill="#D85A30"/><text class="ts" x="158" y="659">Unmatched</text>
<rect x="270" y="648" width="12" height="12" rx="2" fill="#BA7517"/><text class="ts" x="288" y="659">Discrepancy</text>
</svg>
